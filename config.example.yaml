providers:
  deepseek:
    api_key: your-api-key
    api_base: https://api.deepseek.com/v1
    api_type: openai-chat
    auth_type: bearer-token
    models:
      - deepseek-chat
      - deepseek-reasoner

agents:
  lucky:
    name: LuckyClaw
    soul_path: SOUL.md
    default_model: deepseek/deepseek-chat
    models:
      - deepseek/deepseek-chat
      - deepseek/deepseek-reasoner

default_agent: lucky

bindings:
  - channel: terminal
    account_id: local
    agent_id: lucky

  # chat_id 可将某个聊天绑定到指定 Agent；thread_id 可进一步覆盖其中一个线程。
  # - channel: telegram
  #   account_id: bot-id
  #   chat_id: group-id
  #   thread_id: topic-id
  #   agent_id: lucky

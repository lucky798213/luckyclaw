name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go test ./...

  race:
    name: 竞态检测
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go test -race ./...

  vet:
    name: 静态检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go vet ./...

  coverage:
    name: 覆盖率
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: 生成覆盖率数据
        run: go test -covermode=atomic -coverprofile=coverage.out ./...
      - name: 写入覆盖率摘要
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          {
            echo '### 覆盖率'
            echo '```text'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: 上传覆盖率文件
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 14

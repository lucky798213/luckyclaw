<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="LuckyClaw Agent 本地工作台">
  <title>LuckyClaw · Agent 工作台</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <a class="skip-link" href="#app">跳到主要内容</a>
  <main id="app" tabindex="-1">
    <div class="boot-screen" role="status" aria-live="polite">
      <div class="brand-mark" aria-hidden="true"><span>LC</span></div>
      <p>正在唤醒你的 Agent 工作台…</p>
    </div>
  </main>
  <dialog class="agent-dialog" id="agent-dialog" aria-labelledby="agent-dialog-title">
    <form method="dialog" class="dialog-shell">
      <div class="dialog-icon" aria-hidden="true">+</div>
      <div>
        <p class="eyebrow">Agent 来源</p>
        <h2 id="agent-dialog-title">从配置创建，运行时出现</h2>
        <p class="dialog-copy">当前 Agent 由 <code>config.yaml</code> 加载。添加配置和对应的 Soul 文件后重启 LuckyClaw，新 Agent 会自动出现在这里。</p>
      </div>
      <pre class="config-sample"><code>agents:
  researcher:
    name: Researcher
    soul_path: RESEARCHER.md
    default_model: deepseek/deepseek-chat
    models:
      - deepseek/deepseek-chat</code></pre>
      <div class="dialog-actions">
        <button class="button button-secondary" value="cancel">稍后再说</button>
        <button class="button button-primary" type="button" id="copy-config">复制示例</button>
      </div>
    </form>
  </dialog>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="/static/app.js" defer></script>
</body>
</html>
